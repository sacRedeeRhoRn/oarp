<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1220"/>
      <stop offset="100%" stop-color="#1f1c34"/>
    </linearGradient>
    <linearGradient id="box" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#32307a"/>
      <stop offset="100%" stop-color="#29285d"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c9c1ff"/>
    </marker>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="64" y="84" fill="#f9f4ff" font-size="44" font-family="Segoe UI, Arial, sans-serif" font-weight="700">ML Core: GNN First, Tabular Fusion Next</text>
  <text x="64" y="124" fill="#d9cfff" font-size="22" font-family="Segoe UI, Arial, sans-serif">Universal training on broad corpus, then system fine-tune by target slice.</text>

  <rect x="70" y="190" width="1460" height="610" rx="28" fill="#1a1b39" stroke="#9b8dff" stroke-width="2"/>

  <rect x="120" y="260" width="260" height="130" rx="20" fill="url(#box)" stroke="#d6ceff"/>
  <text x="148" y="315" fill="#f4f1ff" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Dual Graph</text>
  <text x="148" y="350" fill="#e2dbff" font-size="19" font-family="Segoe UI, Arial, sans-serif">article + concept</text>

  <rect x="120" y="470" width="260" height="130" rx="20" fill="url(#box)" stroke="#d6ceff"/>
  <text x="148" y="525" fill="#f4f1ff" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Numeric Matrix</text>
  <text x="148" y="560" fill="#e2dbff" font-size="19" font-family="Segoe UI, Arial, sans-serif">process + context + MP</text>

  <rect x="470" y="260" width="300" height="340" rx="20" fill="url(#box)" stroke="#d6ceff"/>
  <text x="500" y="315" fill="#f4f1ff" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700">PyG Hetero-GNN</text>
  <text x="500" y="354" fill="#e2dbff" font-size="20" font-family="Segoe UI, Arial, sans-serif">message passing on</text>
  <text x="500" y="384" fill="#e2dbff" font-size="20" font-family="Segoe UI, Arial, sans-serif">typed nodes and edges</text>
  <text x="500" y="430" fill="#91ffe0" font-size="18" font-family="Segoe UI, Arial, sans-serif">outputs graph embeddings</text>

  <rect x="860" y="260" width="300" height="340" rx="20" fill="url(#box)" stroke="#d6ceff"/>
  <text x="890" y="315" fill="#f4f1ff" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Tabular Head</text>
  <text x="890" y="354" fill="#e2dbff" font-size="20" font-family="Segoe UI, Arial, sans-serif">xgboost/lightgbm</text>
  <text x="890" y="384" fill="#e2dbff" font-size="20" font-family="Segoe UI, Arial, sans-serif">fused with GNN vectors</text>
  <text x="890" y="430" fill="#91ffe0" font-size="18" font-family="Segoe UI, Arial, sans-serif">predicts phase + quality</text>

  <rect x="1250" y="260" width="220" height="340" rx="20" fill="url(#box)" stroke="#d6ceff"/>
  <text x="1276" y="315" fill="#f4f1ff" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Fine-tune</text>
  <text x="1276" y="354" fill="#e2dbff" font-size="20" font-family="Segoe UI, Arial, sans-serif">target slice</text>
  <text x="1276" y="384" fill="#e2dbff" font-size="20" font-family="Segoe UI, Arial, sans-serif">(e.g. NiSi</text>
  <text x="1276" y="412" fill="#e2dbff" font-size="20" font-family="Segoe UI, Arial, sans-serif"><= 200nm)</text>
  <text x="1276" y="458" fill="#91ffe0" font-size="18" font-family="Segoe UI, Arial, sans-serif">ceiling-aware gates</text>

  <line x1="380" y1="325" x2="470" y2="325" stroke="#c9c1ff" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="380" y1="535" x2="860" y2="535" stroke="#c9c1ff" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="770" y1="430" x2="860" y2="430" stroke="#c9c1ff" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1160" y1="430" x2="1250" y2="430" stroke="#c9c1ff" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="420" y="680" width="760" height="80" rx="16" fill="#2d2962" stroke="#b8a9ff"/>
  <text x="456" y="730" fill="#f0eaff" font-size="24" font-family="Segoe UI, Arial, sans-serif">Outputs: processor_eval_metrics, recipe_rank_scores, uncertainty, gate audit</text>
</svg>
